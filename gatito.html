<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gatito uwu 🐱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #ffd1dc 0%, #c9e4ff 100%);
      color: #5a4a6a;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.6);
    }

    .tarjeta {
      background: #fff;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 480px;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .tarjeta:hover {
      transform: translateY(-6px) rotate(-1deg);
    }

    .tarjeta img {
      width: 100%;
      border-radius: 16px;
      display: block;
    }

    p {
      margin-top: 16px;
      font-size: 1.3rem;
    }

    .corazones {
      font-size: 1.6rem;
      margin-top: 10px;
      animation: latido 1.2s infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <h1>¡Hola gatito! uwu</h1>

  <div class="tarjeta">
    <img
      src="https://cataas.com/cat?width=440&height=340"
      alt="Un gatito adorable uwu"
    >
    <p>Un michi para alegrarte el día 🐾</p>
    <div class="corazones">💖 uwu 💖</div>
  </div>
</body>
</html>
